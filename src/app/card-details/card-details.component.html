<div class="container">

    <div class="card shadow-lg border-0 rounded-4 p-4 ">
        <div class="card-body">
            <img class="w-25" [src]="myData.images[0]">
            <h1>{{myData.title}}</h1>
            <p>{{myData.description}}</p>

            <div class="mt-3">
                <ul>
                    <li *ngFor="let r of myData?.reviews">
                        {{r.comment}} , {{r.reviewerEmail}}
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>
