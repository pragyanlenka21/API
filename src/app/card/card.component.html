        <div class="rfc-wrapper" *ngIf="showLoader">
            <div class="rfc-flux-node">
                <div class="rfc-ring rfc-r1"></div>
                <div class="rfc-ring rfc-r2"></div>
                <div class="rfc-ring rfc-r3"></div>
                <div class="rfc-dot"></div>
            </div>
        </div>

        <ng-container *ngIf="!showLoader">
            <div class="col-4 mb-3 mt-2" *ngFor="let product of myData">
                <div class="card  h-100 shadow text-center d-none" (click)="getDetails(product.id)">
                    <div class="card-body">
                        <img class="card-img-top" [src]="product.images[0]" alt="productimage">
                        <h2>{{product.title}}</h2>
                        <p>{{product.description}}</p>
                        <h3>Category:{{product.category}}</h3>
                        <h4 class="price">Price: $ {{ product.price }}</h4>
                        <h3>{{product.brand}}</h3>

                        <p>Width : {{product.dimensions?.width}}</p>
                        <p>height : {{product.dimensions?.height}}</p>
                        <p>depth : {{product.dimensions?.depth}}</p>
